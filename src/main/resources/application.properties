spring.application.name=demo

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/document-analyzer

# Server
server.port=8081

# Upload
file.upload-dir=uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tesseract OCR
tesseract.data-path=C:/Program Files/Tesseract-OCR/tessdata
tesseract.language=fra+eng

# Gemini AI
gemini.api.key=TON_API_KEY_ICI
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Index
spring.data.mongodb.auto-index-creation=true
nlp.service.url=http://localhost:8000